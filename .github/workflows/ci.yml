name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Lint
        run: uv run --extra dev ruff check .
      - name: Test
        run: uv run --extra dev pytest
      - name: Build
        run: uv build --python 3.11
